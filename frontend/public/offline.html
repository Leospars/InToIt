<!DOCTYPE html>
<html lang="en" data-theme="void">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INTOIT — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #050508;
      color: #e8ecf8;
      font-family: 'Outfit', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      text-align: center;
      padding: 24px;
    }
    .logo {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: rgba(0,229,255,0.1);
      border: 1px solid rgba(0,229,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 700; color: #00e5ff;
      margin: 0 auto;
    }
    h1 { font-size: 24px; font-weight: 600; }
    p { color: rgba(232,236,248,0.5); font-size: 14px; max-width: 320px; line-height: 1.6; }
    button {
      padding: 10px 24px;
      border-radius: 10px;
      background: rgba(0,229,255,0.1);
      border: 1px solid rgba(0,229,255,0.3);
      color: #00e5ff;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    button:hover { background: rgba(0,229,255,0.2); }
    .note { font-size: 12px; color: rgba(232,236,248,0.3); margin-top: 8px; }
  </style>
</head>
<body>
  <div class="logo">I</div>
  <h1>You're offline</h1>
  <p>INTOIT Learning requires a connection to generate AI-powered content. Your progress and settings are saved locally.</p>
  <button onclick="window.location.reload()">Try again</button>
  <p class="note">Flash cards and previously viewed content may still be available.</p>
</body>
</html>
